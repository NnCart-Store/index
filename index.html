<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {  
  apiKey: "YOUR_API_KEY",  
  authDomain: "nncart.firebaseapp.com",  
  projectId: "nncart"  
};  
firebase.initializeApp(firebaseConfig);  
const db = firebase.firestore();  
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwnQRCdMGFgLKt4e5i-RbetOt4h88Qg1vDDgFWgkiATafh0Fe9crFSJKtQPHv2Gb09E/exec";  
  
let allProducts = [];  
let cart = [];  
let currentQuickItem = null;  

async function loadProducts() {  
  const container = document.getElementById("products");
  container.innerHTML = "<p class='text-center w-full col-span-2 py-10 text-gray-500 font-bold'>Loading Products...</p>";

  try {  
    let combinedData = {}; 

    const [sheetResponse, firebaseItems] = await Promise.all([
        fetch(SHEET_URL + "?action=getInventory").then(res => res.json()).catch(e => { console.log("Sheet fetch error:", e); return null; }),
        db.collection("products").get().then(snap => snap.docs.map(doc => doc.data())).catch(e => { console.log("Firebase fetch error:", e); return []; })
    ]);

    firebaseItems.forEach(item => {
        const barcode = item.Barcode || item.barcode;
        if(barcode) { combinedData[barcode] = item; }
    });

    if (sheetResponse && sheetResponse.status === "success" && Array.isArray(sheetResponse.data)) {
        sheetResponse.data.forEach(item => { 
            const barcode = item.Barcode || item.barcode;
            if(barcode) {
                combinedData[barcode] = Object.assign({}, combinedData[barcode] || {}, item); 
            }
        });
    }

    allProducts = Object.values(combinedData);

    if (allProducts.length > 0) {
        renderProducts(allProducts);
    } else {
        container.innerHTML = "<p class='text-center w-full col-span-2 py-10 text-gray-400'>Koi product nahi mila!</p>";
    }

  } catch(e) { 
      console.error(e);
      container.innerHTML = "<p class='text-center w-full col-span-2 py-10 text-red-500'>❌ Load Error. Try Refreshing.</p>";
  }  
}

async function submitOrder() {
    const btn = document.getElementById("cartSubmitBtn");
    const nameVal = document.getElementById("cName").value.trim();
    const mobileVal = document.getElementById("mobile").value.trim();
    const addressVal = document.getElementById("address").value.trim();

    if (cart.length === 0) return alert("Aapka cart khali hai!");
    if (!nameVal || !mobileVal || !addressVal) {
        return alert("Kripya poori detail bharein!");
    }

    btn.disabled = true;
    btn.innerText = "PROCESSING...";

    // 1. Details nikalna (Aapke purane logic ke mutabik keys fix ki hain)
    const productNames = cart.map(item => {
        const pName = item.name || item.ProductName || item["Product Name"] || "No Name";
        return `${pName} (x${item.qty})`;
    }).join(", ");

    const totalPrice = cart.reduce((sum, item) => {
        const pPrice = Number(item.price || item.Price || 0);
        return sum + (pPrice * item.qty);
    }, 0);

    const firstBarcode = cart[0].barcode || cart[0].Barcode || "";
    const firstPrice = cart[0].price || cart[0].Price || "";
    const firstSize = cart[0].size || cart[0].Size || "";
    const firstColor = cart[0].color || cart[0].Color || "";
    const firstCategory = cart[0].category || cart[0].Category || "";

    // 🔥 Galti 1 Fix: Google Apps Script ke liye Query Parameters taiyar karna
    // Isse sheet ke "order" tab me data sahi columns me jayega
    const urlParams = `?action=addOrder` // Aapka order save karne ka action name
        + `&CustomerName=${encodeURIComponent(nameVal)}`
        + `&Mobile=${encodeURIComponent(mobileVal)}`
        + `&Address=${encodeURIComponent(addressVal)}`
        + `&Products=${encodeURIComponent(productNames)}`
        + `&Total=${encodeURIComponent(totalPrice)}`
        + `&Barcode=${encodeURIComponent(firstBarcode)}`
        + `&Price=${encodeURIComponent(firstPrice)}`
        + `&Size=${encodeURIComponent(firstSize)}`
        + `&Color=${encodeURIComponent(firstColor)}`
        + `&Category=${encodeURIComponent(firstCategory)}`
        + `&Status=Pending`;

    try {
        // 🔥 Galti 2 Fix: Sabse pehle Firebase se automatic stock minus (-) karo
        const batch = db.batch(); // Firebase Transaction Batch
        
        cart.forEach(item => {
            const itemBarcode = item.barcode || item.Barcode;
            if (itemBarcode) {
                const productRef = db.collection("products").doc(itemBarcode);
                // Firebase automatic stock me se quantity kam kar dega
                batch.update(productRef, {
                    stock: firebase.firestore.FieldValue.increment(-Number(item.qty))
                });
            }
        });
        
        // Firebase me stock update lock karo
        await batch.commit();
        console.log("Firebase Stock Deducted Successfully! ✅");

        // 3. Ab Google Sheet me order bhej do
        // (Aapke SHEET_URL me params jod kar fetch chala rahe hain)
        const sheetResponse = await fetch(SHEET_URL + urlParams);
        const resultText = await sheetResponse.text();

        alert("🛍️ Order successfully place ho gaya aur Stock automatic kam ho gaya!");
        
        // 4. Cart aur UI reset karein
        cart = []; 
        updateCartUI();
        document.getElementById("orderBox").classList.add('hidden');
        
        // Form clear karein
        document.getElementById("cName").value = "";
        document.getElementById("mobile").value = "";
        document.getElementById("address").value = "";

    } catch (error) {
        console.error("Order submission failed:", error);
        alert("❌ Order fail ho gaya! Kripya connection check karein.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Place Order";
    }
}



window.handleAddToCart = function(idx) { addToCart(allProducts[idx]); };
window.handleQuickOrder = function(idx) { openQuickOrder(allProducts[idx]); };
  
function searchProduct() {  
  const v = document.getElementById("search").value.toLowerCase();  
  const filtered = allProducts.filter(p => {
      const name = p["Product Name"] || p["ProductName"] || p.productname || p.Name || p.name || "";
      return String(name).toLowerCase().includes(v);
  });  
  renderProducts(filtered);  
}  
  
function filterByCategory(cat) {  
  const filtered = allProducts.filter(p => {
      const category = p.Category || p.category || "";
      return String(category).toLowerCase() === cat.toLowerCase();
  });  
  renderProducts(filtered);  
}  
  
function toggleCart() { document.getElementById("orderBox").classList.toggle("hidden"); }  
  
function addToCart(p) {  
  const name = p["Product Name"] || p["ProductName"] || p.productname || p.Name || p.name;  
  const found = cart.find(i => (i["Product Name"] || i["ProductName"] || i.productname || i.Name || i.name) === name);  
  if(found){ found.qty += 1; } else { p.qty = 1; cart.push(p); }  
  updateCartUI();  
}  
  
function updateCartUI() {  
  document.getElementById("cartCount").innerText = cart.length;  
  let h = ""; let total = 0;  
  cart.forEach((item, index) => {  
      const name = item["Product Name"] || item["ProductName"] || item.productname || item.Name || item.name;
      const price = item.Price || item.price || 0;
      h += `<div class="flex justify-between text-sm">${name} x${item.qty} <span>₹${price * item.qty}</span></div>`;  
      total += (price * item.qty);  
  });  
  document.getElementById("cartItems").innerHTML = h;  
  document.getElementById("total").innerText = total;  
}  
  
function openQuickOrder(p) {  
    currentQuickItem = p;  
    const name = p["Product Name"] || p["ProductName"] || p.productname || p.Name || p.name;
    document.getElementById("selectedItemName").innerText = "Item: " + name;  
    document.getElementById("quickOrderBox").classList.remove("hidden");  
}  
  
function closeQuickOrder() { document.getElementById("quickOrderBox").classList.add("hidden"); }  
  
// 🔥 FIXED QUICK ORDER MAPPING (Saare columns bharega)
async function confirmQuickOrder() {  
    const btn = document.getElementById("quickSubmitBtn");
    const nameVal = document.getElementById("qName").value.trim();
    const mobileVal = document.getElementById("qMobile").value.trim();
    const addressVal = document.getElementById("qAddress").value.trim();

    if(!nameVal || !mobileVal || !addressVal) {
        return alert("Kripya poori detail bharein!");
    }

    btn.disabled = true;
    btn.innerText = "PROCESSING...";

    const barcodeVal = currentQuickItem.Barcode || currentQuickItem.barcode || "";
    const pName = currentQuickItem["Product Name"] || currentQuickItem["ProductName"] || currentQuickItem.Name || currentQuickItem.name || "";
    const priceVal = currentQuickItem.Price || currentQuickItem.price || 0;
    const catVal = currentQuickItem.Category || currentQuickItem.category || "";
    const descVal = currentQuickItem.Description || currentQuickItem.description || "";

    const data = {  
        "Customer Name": nameVal,  
        "Mobile": mobileVal,  
        "Address": addressVal,  
        "Products": pName,  
        "Total": priceVal,  
        "BarcodeID": barcodeVal, // 🔥 Fixed as per sheet
        "Price": priceVal,
        "Size": document.getElementById("qSize").value.trim() || currentQuickItem.Size || "",
        "Color": document.getElementById("qColor").value.trim() || currentQuickItem.Color || "",
        "Category": catVal,
        "Description": descVal,
        "Stock": "1",
        "Status": "Pending"  
    };  
    await submitLogic(data);  
    btn.disabled = false;
    btn.innerText = "CONFIRM ✅";
    closeQuickOrder();  
}  


// 🔥 FIXED CART ORDER MAPPING (Saare missing columns jod diye hain)
async function submitOrder() {
    const btn = document.getElementById("cartSubmitBtn");
    const nameVal = document.getElementById("cName").value.trim();
    const mobileVal = document.getElementById("mobile").value.trim();
    const addressVal = document.getElementById("address").value.trim();

    if (cart.length === 0) return alert("Aapka cart khali hai!");
    if (!nameVal || !mobileVal || !addressVal) {
        return alert("Kripya poori detail bharein!");
    }

    btn.disabled = true;
    btn.innerText = "PROCESSING...";

    const productNames = cart.map(item => {
        const name = item["Product Name"] || item["ProductName"] || item.Name || item.name || "";
        return `${name} (x${item.qty})`;
    }).join(", ");
    
    const totalPrice = cart.reduce((sum, item) => sum + ((item.Price || item.price || 0) * item.qty), 0);
    const firstBarcode = cart[0].Barcode || cart[0].barcode || "";
    const firstPrice = cart[0].Price || cart[0].price || 0;
    const firstSize = cart[0].Size || cart[0].size || "";
    const firstColor = cart[0].Color || cart[0].color || "";
    const firstCategory = cart[0].Category || cart[0].category || "";
    const firstDesc = cart[0].Description || cart[0].description || "";
    const totalQty = cart.reduce((sum, item) => sum + (item.qty || 1), 0);

    const data = {  
        "Customer Name": nameVal,  
        "Mobile": mobileVal,  
        "Address": addressVal,  
        "Products": productNames,  
        "Total": totalPrice,  
        "BarcodeID": firstBarcode, // 🔥 Fixed as per sheet
        "Price": firstPrice,
        "Size": firstSize,
        "Color": firstColor,
        "Category": firstCategory,
        "Description": firstDesc,
        "Stock": String(totalQty),
        "Status": "Pending"  
    };  

    await submitLogic(data);  
    btn.disabled = false;
    btn.innerText = "Place Order";
    cart = []; 
    updateCartUI();
    document.getElementById("orderBox").classList.add("hidden");
}

  
async function submitLogic(data) {  
    try {  
        await db.collection("orders").add(data);  
        
        await fetch(SHEET_URL, { 
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "placeOrder", ...data }) 
        });

        const barcodeParam = data.Barcode;
        if(barcodeParam) {
            await fetch(SHEET_URL + `?action=updateStock&barcode=${encodeURIComponent(barcodeParam)}&qty=1`, { mode: "no-cors" });

            const fbSnap = await db.collection("products").where("Barcode", "==", barcodeParam).get();
            fbSnap.forEach(doc => {
                let currentStock = parseInt(doc.data().Stock || doc.data().stock) || 1;
                let newStock = currentStock - 1;
                if(newStock < 0) newStock = 0;
                doc.ref.update({ Stock: newStock });
            });
        }

        alert("Order Success ✅ Stock Updated");  
        loadProducts(); 
    } catch(e) { 
        console.error(e);
        alert("Error ❌ Code Check Karein"); 
    }  
}  
  
loadProducts();  

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('Service Worker Active!'))
      .catch(err => console.log('Service Worker Error', err));
  });
}
</script>
