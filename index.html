<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF0000">
    <title>NnCart Full Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        img { background:#eee; min-height: 100px; }
        .product-card:active { transform: scale(0.98); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #quickOrderBox { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-[#003399] text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
        <div class="flex flex-col" onclick="location.reload()">
            <h1 class="text-2xl font-black italic tracking-tighter leading-none">NnCart</h1>
            <p class="text-[8px] italic font-medium opacity-90">Sab Kuch... Yahin Se!</p>
        </div>
        <div class="flex items-center gap-4">
            <i class="fa-solid fa-magnifying-glass text-lg cursor-pointer" onclick="document.getElementById('search').focus()"></i>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold border-2 border-[#003399]">0</span>
            </div>
        </div>
    </header>

    <div class="bg-[#003399] p-3 pb-8 rounded-b-[30px] shadow-lg">
        <div class="relative flex items-center">
            <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-400"></i>
            <input id="search" oninput="searchProduct()" placeholder="Search for products..." class="w-full p-3 pl-12 rounded-xl outline-none text-sm text-gray-700 shadow-inner">
        </div>
    </div>

    <div class="flex gap-4 overflow-x-auto no-scrollbar p-4 bg-white">
        <div onclick="filterByCategory('Saree')" class="flex flex-col items-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
                <img src="https://m.media-amazon.com/images/I/71z3uD+6clL._AC_UY1100_.jpg" class="w-full h-full object-cover">
            </div>
            <span class="text-[11px] font-bold mt-1 text-gray-700">Shari</span>
        </div>
        <div onclick="filterByCategory('Kurti')" class="flex flex-col items-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
                <img src="https://m.media-amazon.com/images/I/61vI80lYv+L._AC_UY1100_.jpg" class="w-full h-full object-cover">
            </div>
            <span class="text-[11px] font-bold mt-1 text-gray-700">Kurti</span>
        </div>
        <div onclick="filterByCategory('Jeans')" class="flex flex-col items-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
                <img src="https://5.imimg.com/data5/ANDROID/Default/2021/1/WA/TC/ZZ/27725946/product-500x500.jpg" class="w-full h-full object-cover">
            </div>
            <span class="text-[11px] font-bold mt-1 text-gray-700">Jeans</span>
        </div>
    </div> 

    <div id="products" class="grid grid-cols-2 gap-3 p-3"></div>

    <div id="quickOrderBox" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black mb-2 text-red-600 border-b pb-2">Quick Order</h2>
            <p id="selectedItemName" class="font-bold text-gray-700 mb-4 bg-gray-100 p-2 rounded-lg text-sm"></p>
            <div class="space-y-3">
                <input id="qName" placeholder="आपका नाम" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input id="qMobile" placeholder="मोबाइल नंबर" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <textarea id="qAddress" placeholder="पूरा पता" class="w-full p-3 bg-gray-50 border rounded-xl outline-none h-20"></textarea>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeQuickOrder()" class="flex-1 py-3 text-gray-400">CANCEL</button>
                <button onclick="confirmQuickOrder()" class="flex-1 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg">CONFIRM ✅</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { apiKey: "YOUR_API_KEY", projectId: "nncart" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // 🔥 SHEET URL FIX
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbwQTRONnq_uDtFnXArJva1kvqn6sK_OFsU9hgULXUCcOlxC7P13l_YM9k0vsdxXj9wm/exec";

        let allProducts = [];
        let cart = [];

        // 🔥 FIX: Ab yeh seedha Google Sheet se data uthayega
        async function loadProducts() {
            try {
                const response = await fetch(SHEET_URL + "?action=getInventory");
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch(e) {
                console.log("Sheet Error, Loading Firebase...");
                const snap = await db.collection("products").get();
                allProducts = snap.docs.map(doc => doc.data());
                renderProducts(allProducts);
            }
        }

        function renderProducts(list) {
            let html = ""; 
            list.forEach(p => {
                // 🔥 FIX: Aapki sheet ke columns "Image", "Name", "Price" hain
                const img = p.Image || 'https://via.placeholder.com/150';
                const name = p.Name || "No Name";
                const price = p.Price || 0;

                html += `
                <div class="bg-white p-2 rounded-2xl shadow-md flex flex-col border border-gray-100">
                    <img src="${img}" class="h-32 w-full object-cover rounded-xl" onerror="this.src='https://via.placeholder.com/150'">
                    <h3 class="text-[11px] font-bold mt-2 truncate text-gray-800">${name}</h3>
                    <p class="text-red-600 font-black text-sm mb-2">₹${price}</p>
                    <button onclick='openQuickOrder(${JSON.stringify(p)})' class="w-full bg-[#FFD700] text-black text-[10px] py-2 rounded-lg font-black shadow-sm">BUY NOW</button>
                </div>`;
            });
            document.getElementById("products").innerHTML = html;
        }

        function searchProduct() {
            const v = document.getElementById("search").value.toLowerCase();
            const filtered = allProducts.filter(p => (p.Name || "").toLowerCase().includes(v));
            renderProducts(filtered);
        }

        function filterByCategory(cat) {
            const filtered = allProducts.filter(p => (p.Category || "").toLowerCase() === cat.toLowerCase());
            renderProducts(filtered);
        }

        function openQuickOrder(p) {
            currentQuickItem = p;
            document.getElementById("selectedItemName").innerText = p.Name;
            document.getElementById("quickOrderBox").classList.remove("hidden");
        }

        function closeQuickOrder() { document.getElementById("quickOrderBox").classList.add("hidden"); }

        async function confirmQuickOrder() {
            const data = {
                action: "placeOrder",
                CustomerName: qName.value,
                Mobile: qMobile.value,
                Address: qAddress.value,
                Products: currentQuickItem.Name,
                Price: currentQuickItem.Price
            };
            
            try {
                await fetch(SHEET_URL, { method: "POST", body: JSON.stringify(data) });
                alert("Order Success ✅");
                closeQuickOrder();
            } catch(e) { alert("Error ❌"); }
        }

        loadProducts();
    </script>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around">
        <button onclick="location.reload()" class="text-red-600 flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[10px]">HOME</span></button>
        <button class="text-gray-500 flex flex-col items-center"><i class="fa-solid fa-layer-group"></i><span class="text-[10px]">CATEGORY</span></button>
    </footer>

</body>
</html>
