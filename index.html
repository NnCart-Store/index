<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF0000">

<title>NnCart Full Fixed</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

body{
background:#f3f4f6;
font-family:sans-serif;
}

img{
background:#eee;
min-height:100px;
}

.no-scrollbar::-webkit-scrollbar{
display:none;
}

.no-scrollbar{
-ms-overflow-style:none;
scrollbar-width:none;
}

.line-clamp-2{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.product-card:active{
transform:scale(.98);
}

</style>
</head>

<body class="pb-24">

<!-- HEADER -->

<header class="bg-[#003399] text-white p-4 sticky top-0 z-50 shadow-lg">

<div class="flex justify-between items-center">

<div onclick="location.reload()" class="cursor-pointer">

<h1 class="text-2xl font-black italic">
NnCart
</h1>

<p class="text-[9px] opacity-80">
Sab Kuch... Yahin Se!
</p>

</div>

<div class="flex items-center gap-4">

<i onclick="document.getElementById('search').focus()"
class="fa-solid fa-magnifying-glass text-xl cursor-pointer"></i>

<div class="relative cursor-pointer"
onclick="toggleCart()">

<i class="fa-solid fa-cart-shopping text-2xl"></i>

<span id="cartCount"
class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-1.5 py-0.5 rounded-full">
0
</span>

</div>

</div>

</div>

<div class="mt-4 relative">

<input
id="search"
oninput="searchProduct()"
placeholder="Search Products..."
class="w-full p-3 rounded-xl outline-none text-black pl-12"
/>

<i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-500"></i>

</div>

</header>

<!-- BANNER -->

<div class="p-3">

<div class="bg-gradient-to-r from-red-500 to-orange-500 rounded-3xl p-5 text-white shadow-xl">

<h2 class="text-3xl font-black italic">
BIG SALE 🔥
</h2>

<p class="mt-1 font-bold">
UP TO 55% OFF
</p>

</div>

</div>

<!-- CATEGORY -->

<div class="flex gap-4 overflow-x-auto no-scrollbar p-4 bg-white">

<div onclick="filterByCategory('Saree')" class="min-w-[70px] text-center cursor-pointer">

<img src="https://m.media-amazon.com/images/I/71z3uD+6clL._AC_UY1100_.jpg"
class="w-16 h-16 rounded-full object-cover mx-auto border"/>

<p class="text-xs mt-1 font-bold">
Saree
</p>

</div>

<div onclick="filterByCategory('Kurti')" class="min-w-[70px] text-center cursor-pointer">

<img src="https://m.media-amazon.com/images/I/61vI80lYv+L._AC_UY1100_.jpg"
class="w-16 h-16 rounded-full object-cover mx-auto border"/>

<p class="text-xs mt-1 font-bold">
Kurti
</p>

</div>

<div onclick="filterByCategory('Jeans')" class="min-w-[70px] text-center cursor-pointer">

<img src="https://5.imimg.com/data5/ANDROID/Default/2021/1/WA/TC/ZZ/27725946/product-500x500.jpg"
class="w-16 h-16 rounded-full object-cover mx-auto border"/>

<p class="text-xs mt-1 font-bold">
Jeans
</p>

</div>

<div onclick="filterByCategory('Shirt')" class="min-w-[70px] text-center cursor-pointer">

<img src="https://m.media-amazon.com/images/I/71S9O6Ojc6L._AC_UY1100_.jpg"
class="w-16 h-16 rounded-full object-cover mx-auto border"/>

<p class="text-xs mt-1 font-bold">
Shirt
</p>

</div>

</div>

<!-- PRODUCTS -->

<div id="products"
class="grid grid-cols-2 gap-3 p-3">
</div>

<!-- CART MODAL -->

<div id="orderBox"
class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">

<div class="bg-white w-full max-w-sm rounded-3xl p-5 max-h-[90vh] overflow-y-auto">

<h2 class="text-2xl font-black text-red-600 mb-4">
Your Cart
</h2>

<div id="cartItems" class="space-y-2"></div>

<div class="border-t mt-4 pt-4">

<p class="font-bold flex justify-between">
Total:
<span id="total">₹0</span>
</p>

</div>

<div class="space-y-3 mt-4">

<input id="cName"
placeholder="आपका नाम"
class="w-full p-3 border rounded-xl"/>

<input id="mobile"
placeholder="मोबाइल नंबर"
class="w-full p-3 border rounded-xl"/>

<textarea id="address"
placeholder="पूरा पता"
class="w-full p-3 border rounded-xl h-24"></textarea>

</div>

<div class="flex gap-2 mt-5">

<button
onclick="toggleCart()"
class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">
Close
</button>

<button
onclick="submitOrder()"
class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">
Place Order
</button>

</div>

</div>

</div>

<!-- QUICK BUY -->

<div id="quickOrderBox"
class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">

<div class="bg-white w-full max-w-sm rounded-3xl p-5">

<h2 class="text-xl font-black text-green-600 mb-4">
Quick Order
</h2>

<p id="selectedItemName"
class="bg-gray-100 p-2 rounded-lg text-sm mb-3"></p>

<div class="space-y-3">

<input id="qName"
placeholder="आपका नाम"
class="w-full p-3 border rounded-xl"/>

<input id="qMobile"
placeholder="मोबाइल नंबर"
class="w-full p-3 border rounded-xl"/>

<input id="qSize"
placeholder="Size"
class="w-full p-3 border rounded-xl"/>

<input id="qColor"
placeholder="Color"
class="w-full p-3 border rounded-xl"/>

<textarea id="qAddress"
placeholder="पूरा पता"
class="w-full p-3 border rounded-xl h-20"></textarea>

</div>

<div class="flex gap-2 mt-5">

<button
onclick="closeQuickOrder()"
class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">
Cancel
</button>

<button
onclick="confirmQuickOrder()"
class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">
Confirm
</button>

</div>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"nncart.firebaseapp.com",

projectId:"nncart"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* GOOGLE SHEET URL */

const SHEET_URL =
"https://script.google.com/macros/s/AKfycbwQTRONnq_uDtFnXArJva1kvqn6sK_OFsU9hgULXUCcOlxC7P13l_YM9k0vsdxXj9wm/exec";

/* VARIABLES */

let allProducts = [];

let cart = [];

let currentQuickItem = null;

/* LOAD PRODUCTS */

async function loadProducts(){

try{

const res = await fetch(
SHEET_URL + "?action=getProducts"
);

const data = await res.json();

allProducts = data;

renderProducts(allProducts);

}catch(err){

console.log(err);

document.getElementById("products").innerHTML = `
<div class="col-span-2 text-center text-red-600 font-bold p-10">
Products Load Failed ❌
</div>
`;

}

}

/* RENDER PRODUCTS */

function renderProducts(list){

const container =
document.getElementById("products");

if(!list || list.length===0){

container.innerHTML = `
<div class="col-span-2 text-center p-10 font-bold text-gray-500">
No Products Found
</div>
`;

return;

}

let html = "";

list.forEach((p,index)=>{

const img =
p.image ||
p.Image ||
p["Image URL"] ||
"https://via.placeholder.com/300?text=No+Image";

const name =
p.Name ||
p["Product Name"] ||
"No Product";

const price =
Number(p.Price || 0);

const mrp =
Number(p.MRP || price+100);

html += `

<div class="bg-white rounded-2xl p-2 shadow-md">

<img
src="${img}"
class="w-full h-36 object-cover rounded-xl"
loading="lazy"
onerror="this.src='https://via.placeholder.com/300?text=No+Image'"
>

<div class="flex text-yellow-400 text-[10px] mt-1">

<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star"></i>
<i class="fa-solid fa-star-half-stroke"></i>

</div>

<h3 class="text-[12px] font-bold mt-1 line-clamp-2 min-h-[35px]">
${name}
</h3>

<div class="flex items-center gap-2 mt-1">

<p class="text-red-600 font-black text-lg">
₹${price}
</p>

<p class="line-through text-xs text-gray-400">
₹${mrp}
</p>

</div>

<div class="grid grid-cols-2 gap-2 mt-3">

<button
onclick="addToCart(${index})"
class="bg-gray-100 py-2 rounded-xl text-xs font-bold active:scale-95">
+ Cart
</button>

<button
onclick="openQuickOrder(${index})"
class="bg-yellow-400 py-2 rounded-xl text-xs font-bold active:scale-95">
BUY NOW
</button>

</div>

</div>

`;

});

container.innerHTML = html;

}

/* SEARCH */

function searchProduct(){

const value =
document.getElementById("search")
.value
.toLowerCase();

const filtered =
allProducts.filter(p=>{

const name =
(p.Name || p["Product Name"] || "")
.toLowerCase();

return name.includes(value);

});

renderProducts(filtered);

}

/* CATEGORY */

function filterByCategory(cat){

const filtered =
allProducts.filter(p=>{

return (
(p.Category || "")
.toLowerCase() ===
cat.toLowerCase()
);

});

renderProducts(filtered);

}

/* CART */

function toggleCart(){

document
.getElementById("orderBox")
.classList
.toggle("hidden");

}

/* ADD CART */

function addToCart(index){

const product = allProducts[index];

const name =
product.Name ||
product["Product Name"];

const found =
cart.find(item=>{

return (
(item.Name || item["Product Name"])
=== name
);

});

if(found){

found.qty += 1;

}else{

cart.push({
...product,
qty:1
});

}

updateCartUI();

}

/* UPDATE CART */

function updateCartUI(){

document.getElementById("cartCount").innerText =
cart.reduce((a,b)=>a+b.qty,0);

let html = "";

let total = 0;

cart.forEach((item,index)=>{

const name =
item.Name ||
item["Product Name"];

const price =
Number(item.Price || 0);

total += price * item.qty;

html += `

<div class="bg-gray-100 p-2 rounded-xl flex justify-between items-center">

<div>

<p class="font-bold text-sm">
${name}
</p>

<p class="text-xs text-gray-500">
Qty: ${item.qty}
</p>

</div>

<div class="text-right">

<p class="font-bold text-red-600">
₹${price * item.qty}
</p>

<button
onclick="removeCartItem(${index})"
class="text-xs text-red-500">
Remove
</button>

</div>

</div>

`;

});

document.getElementById("cartItems").innerHTML =
html;

document.getElementById("total").innerText =
"₹"+total;

}

/* REMOVE CART */

function removeCartItem(index){

cart.splice(index,1);

updateCartUI();

}

/* QUICK ORDER */

function openQuickOrder(index){

currentQuickItem =
allProducts[index];

document.getElementById("selectedItemName").innerText =
currentQuickItem.Name ||
currentQuickItem["Product Name"];

document.getElementById("quickOrderBox")
.classList.remove("hidden");

}

function closeQuickOrder(){

document.getElementById("quickOrderBox")
.classList.add("hidden");

}

/* QUICK CONFIRM */

async function confirmQuickOrder(){

const data = {

"Customer Name":
document.getElementById("qName").value,

"Mobile":
document.getElementById("qMobile").value,

"Address":
document.getElementById("qAddress").value,

"Size":
document.getElementById("qSize").value,

"Color":
document.getElementById("qColor").value,

"Products":
currentQuickItem.Name ||
currentQuickItem["Product Name"],

"Total":
currentQuickItem.Price,

"Status":
"Pending"

};

await submitLogic(data);

closeQuickOrder();

}

/* FULL ORDER */

async function submitOrder(){

if(cart.length===0){

alert("Cart Empty");

return;

}

const data = {

"Customer Name":
document.getElementById("cName").value,

"Mobile":
document.getElementById("mobile").value,

"Address":
document.getElementById("address").value,

"Products":
JSON.stringify(cart),

"Total":
cart.reduce((a,b)=>{

return a +
(Number(b.Price || 0) * b.qty);

},0),

"Status":
"Pending"

};

await submitLogic(data);

cart = [];

updateCartUI();

toggleCart();

}

/* SUBMIT */

async function submitLogic(data){

try{

await db.collection("orders").add(data);

await fetch(
SHEET_URL + "?action=placeOrder",
{
method:"POST",
body:JSON.stringify(data)
}
);

alert("Order Success ✅");

}catch(err){

console.log(err);

alert("Order Failed ❌");

}

}

/* START */

loadProducts();

</script>

<!-- FOOTER -->

<footer class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">

<button onclick="location.reload()"
class="flex flex-col items-center text-red-600">

<i class="fa-solid fa-house text-xl"></i>

<span class="text-[10px] font-bold mt-1">
HOME
</span>

</button>

<button onclick="window.scrollTo(0,0)"
class="flex flex-col items-center text-gray-500">

<i class="fa-solid fa-layer-group text-xl"></i>

<span class="text-[10px] font-bold mt-1">
CATEGORIES
</span>

</button>

<button onclick="toggleCart()"
class="flex flex-col items-center text-gray-500">

<i class="fa-solid fa-bag-shopping text-xl"></i>

<span class="text-[10px] font-bold mt-1">
CART
</span>

</button>

<button onclick="alert('Profile Coming Soon')"
class="flex flex-col items-center text-gray-500">

<i class="fa-solid fa-user text-xl"></i>

<span class="text-[10px] font-bold mt-1">
ACCOUNT
</span>

</button>

</footer>

</body>
</html>
