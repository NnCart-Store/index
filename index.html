<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF0000">
<title>NnCart Full Fixed & Fast</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
img { background:#eee; min-height: 100px; }
.product-card:active { transform: scale(0.98); }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
#quickOrderBox { transition: all 0.3s ease; }
</style>
</head>
<body class="bg-gray-100 pb-20">

<header class="bg-[#003399] text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
  <div class="flex flex-col" onclick="location.reload()">
      <h1 class="text-2xl font-black italic tracking-tighter leading-none">NnCart</h1>
      <p class="text-[8px] italic font-medium opacity-90">Sab Kuch... Yahin Se!</p>
  </div>
  <div class="flex items-center gap-4">
    <i class="fa-solid fa-magnifying-glass text-lg cursor-pointer" onclick="document.getElementById('search').focus()"></i>
    <div class="relative cursor-pointer" onclick="toggleCart()">
      <i class="fa-solid fa-cart-shopping text-2xl"></i>
      <span id="cartCount" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold border-2 border-[#003399]">0</span>
    </div>
  </div>
</header>

<div class="bg-[#003399] p-3 pb-8 rounded-b-[30px] shadow-lg">
    <div class="relative flex items-center">
        <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-400"></i>
        <input id="search" oninput="searchProduct()" placeholder="Search for products..." class="w-full p-3 pl-12 rounded-xl outline-none text-sm text-gray-700 shadow-inner">
        <i class="fa-solid fa-microphone absolute right-4 text-[#003399]"></i>
    </div>
</div>

<div class="px-3 -mt-5 mb-2">
    <div class="w-full bg-gradient-to-r from-orange-500 via-red-600 to-pink-600 rounded-2xl shadow-xl overflow-hidden relative border-2 border-white">
        <div class="p-4 flex justify-between items-center relative z-10">
            <div>
                <h3 class="text-white text-[10px] font-bold tracking-widest uppercase opacity-90">Special Offer</h3>
                <p class="text-white text-2xl font-black italic leading-tight">PRIMEUM BIG SALE <br> <span class="text-yellow-300">LIVE NOW</span></p>
                <div class="mt-2 inline-block bg-white text-red-600 text-[12px] px-4 py-1 rounded-full font-black shadow-lg animate-bounce">
                    UP TO 55% OFF
                </div>
            </div>
            <div class="bg-white/20 p-3 rounded-full backdrop-blur-sm">
                <i class="fa-solid fa-bolt-lightning text-yellow-300 text-4xl animate-pulse"></i>
            </div>
        </div>
    </div>
</div>

<div class="flex gap-4 overflow-x-auto no-scrollbar p-4 bg-white">
    <div onclick="renderProducts(allProducts)" class="flex flex-col items-center min-w-[70px] cursor-pointer">
        <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center border-2 border-blue-500 shadow-sm">
            <i class="fa-solid fa-border-all text-blue-600 text-xl"></i>
        </div>
        <span class="text-[11px] font-bold mt-1 text-blue-600">All</span>
    </div>
    <div onclick="filterByCategory('Saree')" class="flex flex-col items-center min-w-[70px] cursor-pointer">
        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
            <img src="https://m.media-amazon.com/images/I/71z3uD+6clL._AC_UY1100_.jpg" class="w-full h-full object-cover">
        </div>
        <span class="text-[11px] font-bold mt-1 text-gray-700">Shari</span>
    </div>
    <div onclick="filterByCategory('Kurti')" class="flex flex-col items-center min-w-[70px] cursor-pointer">
        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
            <img src="https://m.media-amazon.com/images/I/61vI80lYv+L._AC_UY1100_.jpg" class="w-full h-full object-cover">
        </div>
        <span class="text-[11px] font-bold mt-1 text-gray-700">Kurti</span>
    </div>
    <div onclick="filterByCategory('Jeans')" class="flex flex-col items-center min-w-[70px] cursor-pointer">
        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
            <img src="https://5.imimg.com/data5/ANDROID/Default/2021/1/WA/TC/ZZ/27725946/product-500x500.jpg" class="w-full h-full object-cover">
        </div>
        <span class="text-[11px] font-bold mt-1 text-gray-700">Jeans</span>
    </div>
    <div onclick="filterByCategory('Shirt')" class="flex flex-col items-center min-w-[70px] cursor-pointer">
        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm">
            <img src="https://m.media-amazon.com/images/I/71S9O6Ojc6L._AC_UY1100_.jpg" class="w-full h-full object-cover">
        </div>
        <span class="text-[11px] font-bold mt-1 text-gray-700">Shirt</span>
    </div>
</div>

<div id="products" class="grid grid-cols-2 gap-3 p-3"></div>

<div id="orderBox" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h2 class="text-xl font-black mb-2 text-red-600 border-b pb-2">Your Cart</h2>
        <div id="cartItems" class="space-y-2 mb-4"></div>
        <div class="border-t pt-2 mb-4">
            <p class="flex justify-between font-bold">Total: <span id="total">0</span></p>
        </div>
        <div class="space-y-3">
            <input id="cName" placeholder="आपका नाम" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
            <input id="mobile" placeholder="मोबाइल नंबर" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
            <textarea id="address" placeholder="पूरा पता" class="w-full p-3 bg-gray-50 border rounded-xl outline-none h-20"></textarea>
        </div>
        <div class="flex gap-2 mt-6">
            <button onclick="document.getElementById('orderBox').classList.add('hidden')" class="flex-1 py-3 font-bold text-gray-500">Close</button>
            <button id="cartSubmitBtn" onclick="submitOrder()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg">Place Order</button>
        </div>
    </div>
</div>

<div id="quickOrderBox" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h2 class="text-xl font-black mb-2 text-red-600 border-b pb-2 italic uppercase">Quick Order</h2>
        <p id="selectedItemName" class="font-bold text-gray-700 mb-4 bg-gray-100 p-2 rounded-lg text-sm"></p>
        <div class="space-y-3">
            <input id="qName" placeholder="आपका नाम" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
            <input id="qMobile" placeholder="मोबाइल नंबर" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
            <div class="grid grid-cols-2 gap-2">
                <input id="qSize" placeholder="Size (L, XL)" class="p-3 bg-gray-50 border rounded-xl outline-none">
                <input id="qColor" placeholder="Color" class="p-3 bg-gray-50 border rounded-xl outline-none">
            </div>
            <textarea id="qAddress" placeholder="पूरा पता (Full Address)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none h-20"></textarea>
        </div>
        <div class="flex gap-2 mt-6">
            <button onclick="closeQuickOrder()" class="flex-1 py-3 font-bold text-gray-400">CANCEL</button>
            <button id="quickSubmitBtn" onclick="confirmQuickOrder()" class="flex-1 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg border-b-4 border-green-800">CONFIRM ✅</button>
        </div>
    </div>
</div>

<script>
// Google Apps Script URL (Inventory fetching aur Order push dono isi se chalega)
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwnQRCdMGFgLKt4e5i-RbetOt4h88Qg1vDDgFWgkiATafh0Fe9crFSJKtQPHv2Gb09E/exec";  
  
let allProducts = [];  
let cart = [];  
let currentQuickItem = null;  

// 🚀 1. PURE GOOGLE SHEET PRODUCTS LOADER (Direct from Inventory)
async function loadProducts() {  
  const container = document.getElementById("products");
  container.innerHTML = "<p class='text-center w-full col-span-2 py-10 text-gray-500 font-bold'>Loading Products...</p>";

  try {  
    // Direct Google Sheet Call
    const response = await fetch(SHEET_URL + "?action=getInventory");
    const sheetResponse = await response.json();

    if (sheetResponse && sheetResponse.status === "success" && Array.isArray(sheetResponse.data)) {
        allProducts = sheetResponse.data;
        renderProducts(allProducts);
    } else {
        container.innerHTML = "<p class='text-center w-full col-span-2 py-10 text-gray-400'>Koi product nahi mila!</p>";
    }

  } catch(e) { 
      console.error("Sheet load error:", e);
      container.innerHTML = "<p class='text-center w-full col-span-2 py-10 text-red-500'>❌ Load Error. Try Refreshing.</p>";
  }  
}

// 🛍️ 2. CART ORDER SUBMIT (Direct to B2C Sheet with Stock Decrement Trigger)
async function submitOrder() {
    const btn = document.getElementById("cartSubmitBtn");
    const nameVal = document.getElementById("cName").value.trim();
    const mobileVal = document.getElementById("mobile").value.trim();
    const addressVal = document.getElementById("address").value.trim();

    if (cart.length === 0) return alert("Aapka cart khali hai!");
    if (!nameVal || !mobileVal || !addressVal) {
        return alert("Kripya poori detail bharein!");
    }

    btn.disabled = true;
    btn.innerText = "PROCESSING...";

    const productNames = cart.map(item => {
        const pName = item["Product Name"] || item.ProductName || item.name || "No Name";
        return `${pName} (x${item.qty})`;
    }).join(", ");

    const totalPrice = cart.reduce((sum, item) => {
        const pPrice = Number(item.Price || item.price || 0);
        return sum + (pPrice * item.qty);
    }, 0);

    const firstBarcode = cart[0].Barcode || cart[0].barcode || "";
    const firstPrice = cart[0].Price || cart[0].price || "";
    const firstSize = cart[0].Size || cart[0].size || "";
    const firstColor = cart[0].Color || cart[0].color || "";
    const firstCategory = cart[0].Category || cart[0].category || "";

    // B2C Sheet action param mapping
    const urlParams = `?action=addOrder`
        + `&CustomerName=${encodeURIComponent(nameVal)}`
        + `&Mobile=${encodeURIComponent(mobileVal)}`
        + `&Address=${encodeURIComponent(addressVal)}`
        + `&Products=${encodeURIComponent(productNames)}`
        + `&Total=${encodeURIComponent(totalPrice)}`
        + `&Barcode=${encodeURIComponent(firstBarcode)}`
        + `&Price=${encodeURIComponent(firstPrice)}`
        + `&Size=${encodeURIComponent(firstSize)}`
        + `&Color=${encodeURIComponent(firstColor)}`
        + `&Category=${encodeURIComponent(firstCategory)}`
        + `&Status=Pending`;

    try {
        // Order write to sheet
        const sheetResponse = await fetch(SHEET_URL + urlParams);
        await sheetResponse.text();

        // Stock automatic kam karne ke liye Apps Script ko target hit karo (agar loop lagana ho toh sheet code handle karega)
        if (firstBarcode) {
            await fetch(SHEET_URL + `?action=updateStock&barcode=${encodeURIComponent(firstBarcode)}&qty=${cart[0].qty}`).catch(e => console.log(e));
        }

        alert("🛍️ Order successfully place ho gaya!");
        
        cart = []; 
        updateCartUI();
        document.getElementById("orderBox").classList.add('hidden');
        
        document.getElementById("cName").value = "";
        document.getElementById("mobile").value = "";
        document.getElementById("address").value = "";
        loadProducts(); // Fresh inventory reload karo

    } catch (error) {
        console.error("Order submission failed:", error);
        alert("❌ Order fail ho gaya! Kripya connection check karein.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Place Order";
    }
}

window.handleAddToCart = function(idx) { addToCart(allProducts[idx]); };
window.handleQuickOrder = function(idx) { openQuickOrder(allProducts[idx]); };
  
function searchProduct() {  
  const v = document.getElementById("search").value.toLowerCase();  
  const filtered = allProducts.filter(p => {
      const name = p["Product Name"] || p["ProductName"] || p.productname || p.Name || p.name || "";
      return String(name).toLowerCase().includes(v);
  });  
  renderProducts(filtered);  
}  
  
function filterByCategory(cat) {  
  const filtered = allProducts.filter(p => {
      const category = p.Category || p.category || "";
      return String(category).toLowerCase() === cat.toLowerCase();
  });  
  renderProducts(filtered);  
}  
  
function toggleCart() { document.getElementById("orderBox").classList.toggle("hidden"); }  
  
function addToCart(p) {  
  const name = p["Product Name"] || p["ProductName"] || p.productname || p.Name || p.name;  
  const found = cart.find(i => (i["Product Name"] || i["ProductName"] || i.productname || i.Name || i.name) === name);  
  if(found){ found.qty += 1; } else { p.qty = 1; cart.push(p); }  
  updateCartUI();  
}  
  
function updateCartUI() {  
  document.getElementById("cartCount").innerText = cart.length;  
  let h = ""; let total = 0;  
  cart.forEach((item, index) => {  
      const name = item["Product Name"] || item["ProductName"] || item.productname || item.Name || item.name;
      const price = item.Price || item.price || 0;
      h += `<div class="flex justify-between text-sm">${name} x${item.qty} <span>₹${price * item.qty}</span></div>`;  
      total += (price * item.qty);  
  });  
  document.getElementById("cartItems").innerHTML = h;  
  document.getElementById("total").innerText = total;  
}  
  
function openQuickOrder(p) {  
    currentQuickItem = p;  
    const name = p["Product Name"] || p["ProductName"] || p.productname || p.Name || p.name;
    document.getElementById("selectedItemName").innerText = "Item: " + name;  
    document.getElementById("quickOrderBox").classList.remove("hidden");  
}  
  
function closeQuickOrder() { document.getElementById("quickOrderBox").classList.add("hidden"); }  
  
// ⚡ 3. CONFIRM QUICK ORDER (Direct to B2C Sheet with Stock Trigger)
async function confirmQuickOrder() {  
    const btn = document.getElementById("quickSubmitBtn");
    const nameVal = document.getElementById("qName").value.trim();
    const mobileVal = document.getElementById("qMobile").value.trim();
    const addressVal = document.getElementById("qAddress").value.trim();
    const qSize = document.getElementById("qSize").value.trim();
    const qColor = document.getElementById("qColor").value.trim();

    if(!nameVal || !mobileVal || !addressVal) {
        return alert("Kripya poori detail bharein!");
    }

    btn.disabled = true;
    btn.innerText = "PROCESSING...";

    const barcodeVal = currentQuickItem.Barcode || currentQuickItem.barcode || "";
    const pName = currentQuickItem["Product Name"] || currentQuickItem["ProductName"] || currentQuickItem.Name || currentQuickItem.name || "";
    const priceVal = currentQuickItem.Price || currentQuickItem.price || 0;
    const catVal = currentQuickItem.Category || currentQuickItem.category || "";

    const urlParams = `?action=addOrder`
        + `&CustomerName=${encodeURIComponent(nameVal)}`
        + `&Mobile=${encodeURIComponent(mobileVal)}`
        + `&Address=${encodeURIComponent(addressVal)}`
        + `&Products=${encodeURIComponent(pName + " (x1)")}`
        + `&Total=${encodeURIComponent(priceVal)}`
        + `&Barcode=${encodeURIComponent(barcodeVal)}`
        + `&Price=${encodeURIComponent(priceVal)}`
        + `&Size=${encodeURIComponent(qSize)}`
        + `&Color=${encodeURIComponent(qColor)}`
        + `&Category=${encodeURIComponent(catVal)}`
        + `&Status=Pending`;

    try {
        // Submit order row
        const res = await fetch(SHEET_URL + urlParams);
        await res.text();

        // Decrement stock from inventory sheet directly
        if(barcodeVal) {
            await fetch(SHEET_URL + `?action=updateStock&barcode=${encodeURIComponent(barcodeVal)}&qty=1`).catch(e => console.log(e));
        }

        alert("🛍️ Quick Order lag gaya!");
        closeQuickOrder();
        
        document.getElementById("qName").value = "";
        document.getElementById("qMobile").value = "";
        document.getElementById("qAddress").value = "";
        document.getElementById("qSize").value = "";
        document.getElementById("qColor").value = "";
        loadProducts();

    } catch(e) {
        console.error(e);
        alert("Error ❌ Code Check Karein");
    } finally {
        btn.disabled = false;
        btn.innerText = "CONFIRM ✅";
    }
}  

// 📦 4. PRODUCTS RENDER ENGINE
function renderProducts(productsList) {
    const container = document.getElementById("products");
    container.innerHTML = ""; 
    productsList.forEach((item, index) => {
        const pName = item["Product Name"] || item["ProductName"] || item.productname || item.Name || item.name || "No Name";
        const price = item.Price || item.price || 0;
        const img = item.image || item.ImageUrl || item["Image URL"] || "https://via.placeholder.com/150";
        
        container.innerHTML += `
            <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col justify-between product-card">
                <div>
                    <img src="${img}" class="w-full h-32 object-cover rounded-lg">
                    <h3 class="font-bold text-gray-800 text-sm mt-1 line-clamp-2">${pName}</h3>
                </div>
                <div class="mt-2">
                    <span class="text-red-600 font-extrabold text-base">₹${price}</span>
                    <div class="grid grid-cols-2 gap-1 mt-2">
                        <button onclick="window.handleAddToCart(${index})" class="bg-gray-100 text-gray-800 font-bold py-1 px-1 text-xs rounded-lg">+ Cart</button>
                        <button onclick="window.handleQuickOrder(${index})" class="bg-yellow-400 text-gray-900 font-extrabold py-1 px-1 text-xs rounded-lg">BUY NOW</button>
                    </div>
                </div>
            </div>
        `;
    });
}
  
loadProducts();  

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-service-worker.js')
      .then(reg => console.log('Service Worker Active!'))
      .catch(err => console.log('Service Worker Error', err));
  });
}
</script>

<footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-3 z-[100]">  
    <button onclick="location.reload()" class="flex flex-col items-center text-red-600">  
        <i class="fa-solid fa-house text-xl"></i>  
        <span class="text-[10px] font-bold mt-1">HOME</span>  
    </button>  
    <button onclick="document.getElementById('products').scrollIntoView()" class="flex flex-col items-center text-gray-500">  
        <i class="fa-solid fa-layer-group text-xl"></i>  
        <span class="text-[10px] font-bold mt-1">CATEGORIES</span>  
    </button>  
    <button onclick="alert('Orders track feature coming soon!')" class="flex flex-col items-center text-gray-500">  
        <i class="fa-solid fa-truck-fast text-xl"></i>  
        <span class="text-[10px] font-bold mt-1">ORDERS</span>  
    </button>  
    <button onclick="alert('Profile section coming soon!')" class="flex flex-col items-center text-gray-500">  
        <i class="fa-solid fa-user text-xl"></i>  
        <span class="text-[10px] font-bold mt-1">ACCOUNT</span>  
    </button>  
</footer>  
</body>  
</html>
